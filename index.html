<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepAI — Análisis Inteligente del Sueño</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- vis-network -->
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32">
                    <circle cx="16" cy="16" r="14" fill="none" stroke="#0066CC" stroke-width="2"/>
                    <path d="M8 18 Q12 10 16 16 Q20 22 24 14" fill="none" stroke="#0066CC" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="16" cy="16" r="3" fill="#0066CC" opacity="0.3"/>
                </svg>
                <div>
                    <h1 class="logo-title">SleepAI</h1>
                    <span class="logo-subtitle">Análisis Inteligente del Sueño</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem">
                <img src="img/eurecat.png" alt="Eurecat" style="height:26px;width:auto;" />
                <span class="header-badge">DEMO</span>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <button class="nav-tab active" data-tab="upload">
                <svg viewBox="0 0 20 20" width="16" height="16"><path d="M10 3v10M6 7l4-4 4 4M3 14v2a1 1 0 001 1h12a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Inicio
            </button>
            <button class="nav-tab" data-tab="pipeline">
                <svg viewBox="0 0 20 20" width="16" height="16"><path d="M3 4h14M3 8h10M3 12h14M3 16h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                Del Informe al Conocimiento
            </button>
            <button class="nav-tab" data-tab="pacientes">
                <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="6" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4 18c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                Pacientes
            </button>
            <button class="nav-tab" data-tab="clustering">
                <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="6" cy="14" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="14" cy="6" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="15" cy="13" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                Clustering
            </button>
            <button class="nav-tab" data-tab="graph">
                <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="4" cy="15" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="16" cy="15" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="10" y1="7.5" x2="5" y2="12.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="7.5" x2="15" y2="12.5" stroke="currentColor" stroke-width="1.2"/></svg>
                Knowledge Graph
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main" id="main-content">
        <!-- Content injected by JS -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <span>SleepAI Demo · Eurecat · SEPAR 2026</span>
        <span class="footer-note">Datos ficticios con fines demostrativos</span>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/knowledge-graph.js"></script>
    <script src="js/metrics.js"></script>
    <script src="js/clustering.js"></script>
</body>
</html>
